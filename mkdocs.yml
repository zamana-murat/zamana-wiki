      - Claude Nedir?: temeller/claude-nedir.md
      - Modeller: temeller/modeller.md
      - Planlar: temeller/planlar.md
      - Claude vs ChatGPT: temeller/claude-vs-chatgpt.md
      - Sınırlamalar: temeller/sinirlamalar.md
      - Gizlilik ve KVKK: temeller/gizlilik-kvkk.md
      - Sık Sorulan Sorular: temeller/sss.md
      - İlk 7 Gün Rehberi: temeller/ilk-7-gun.md
      - Türkçe Performansı: temeller/turkce-performansi.md
      - Yaygın İtirazlar: temeller/itirazlar.md
  - Araçlar:
      - araclar/index.md
      - Claude Chat: araclar/claude-chat.md
